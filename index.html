<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Bruno Perú</title>
    <style>
        :root { --bg: #f0f2f5; --card: #ffffff; --primary: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--primary); margin: 0; padding: 20px; padding-bottom: 150px; text-align: center; }
        .radio-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 20px; max-width: 900px; margin: 0 auto; }
        .radio-card { background: var(--card); border-radius: 12px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer; transition: 0.3s; border: 1px solid #ddd; width: 130px; margin: auto; }
        .radio-card:hover { transform: translateY(-5px); border-color: #e74c3c; }
        .radio-card img { width: 80px; height: 80px; object-fit: contain; margin-bottom: 10px; background: #f9f9f9; border-radius: 8px; }
        .player-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #1a1a1a; color: white; padding: 20px; box-sizing: border-box; }
        #status { font-size: 14px; margin-bottom: 10px; color: #00ffcc; font-weight: bold; }
        .btn-stop { background: #e74c3c; color: white; border: none; padding: 10px 25px; border-radius: 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <h1>📻 RADIO BRUNO PERÚ</h1>
    <p>Haz clic en un logo para escuchar (Espera 5 segundos)</p>

    <div class="radio-grid">
        <div class="radio-card" onclick="play('https://18493.live.streamtheworld.com/RADIO_NUEVA_Q_SC', 'Nueva Q')">
            <img src="https://grupocpp.pe/img/logos/radio-nueva-q.png" alt="Nueva Q"><div>Nueva Q</div>
        </div>
        <div class="radio-card" onclick="play('https://17503.live.streamtheworld.com/RADIO_RPP_SC', 'RPP')">
            <img src="https://grupocpp.pe/img/logos/radio-rpp.png" alt="RPP"><div>RPP</div>
        </div>
        <div class="radio-card" onclick="play('https://19313.live.streamtheworld.com/PANAMERICANA_SC', 'Panamericana')">
            <img src="https://grupocpp.pe/img/logos/radio-panamericana.png" alt="Panamericana"><div>Panamericana</div>
        </div>
        <div class="radio-card" onclick="play('https://17513.live.streamtheworld.com/RADIO_OXIGENO_SC', 'Oxígeno')">
            <img src="https://grupocpp.pe/img/logos/radio-oxigeno.png" alt="Oxígeno"><div>Oxígeno</div>
        </div>
        <div class="radio-card" onclick="play('https://18313.live.streamtheworld.com/RADIO_STUDIO92_SC', 'Studio 92')">
            <img src="https://grupocpp.pe/img/logos/radio-studio92.png" alt="Studio 92"><div>Studio 92</div>
        </div>
        <div class="radio-card" onclick="play('https://19253.live.streamtheworld.com/RADIO_INOLVIDABLE_SC', 'Inolvidable')">
            <img src="https://grupocpp.pe/img/logos/radio-la-inolvidable.png" alt="Inolvidable"><div>La Inolvidable</div>
        </div>
        <div class="radio-card" onclick="play('https://18323.live.streamtheworld.com/RADIO_FELICIDAD_SC', 'Felicidad')">
            <img src="https://grupocpp.pe/img/logos/radio-felicidad.png" alt="Felicidad"><div>Felicidad</div>
        </div>
        <div class="radio-card" onclick="play('https://19223.live.streamtheworld.com/RADIO_MAGICA_SC', 'Mágica')">
            <img src="https://grupocpp.pe/img/logos/radio-magica.png" alt="Mágica"><div>Mágica</div>
        </div>
    </div>

    <div class="player-bar">
        <div id="status">SELECCIONA UNA RADIO</div>
        <input type="range" min="0" max="1" step="0.1" value="0.8" oninput="setV(this.value)">
        <button class="btn-stop" onclick="stop()">DETENER</button>
    </div>

<script>
    var audio = new Audio();
    var s = document.getElementById('status');

    function play(url, name) {
        s.innerText = "CONECTANDO A " + name + "...";
        audio.pause();
        audio.src = url;
        audio.load();
        audio.play().then(() => { s.innerText = "REPRODUCIENDO: " + name + " 🔴"; })
        .catch(e => { s.innerText = "ERROR: HAZ CLIC OTRA VEZ"; });
    }
    function stop() { audio.pause(); audio.src = ""; s.innerText = "RADIO DETENIDA"; }
    function setV(v) { audio.volume = v; }
</script>
</body>
</html>

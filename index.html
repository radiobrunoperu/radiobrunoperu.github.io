<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Bruno Perú - Emisoras en Vivo</title>
    <style>
        :root { --bg: #f0f2f5; --card: #ffffff; --primary: #2c3e50; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--primary); margin: 0; padding: 20px; padding-bottom: 150px; }
        
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: #e74c3c; font-size: 32px; margin-bottom: 5px; }
        
        /* Ajuste de espacios para que se vea ordenado */
        .radio-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); 
            gap: 20px; 
            max-width: 1000px; 
            margin: 0 auto; 
            justify-items: center; /* Centra las tarjetas en su celda */
        }

        .radio-card { 
            background: var(--card); 
            border-radius: 12px; 
            padding: 15px; 
            text-align: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
            cursor: pointer; 
            transition: 0.3s; 
            border: 1px solid #ddd;
            display: flex; flex-direction: column; align-items: center;
            width: 130px; /* Tamaño fijo para que todas sean iguales */
        }

        .radio-card:hover { transform: translateY(-5px); border-color: #e74c3c; box-shadow: 0 6px 15px rgba(0,0,0,0.1); }
        
        /* Ajuste de tamaño de logos para que no se rompa el espacio */
        .radio-card img { width: 85px; height: 85px; object-fit: contain; margin-bottom: 10px; }
        .radio-name { font-weight: bold; font-size: 13px; color: #333; }

        .player-bar { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: #1a1a1a; color: white; padding: 20px; 
            text-align: center; box-shadow: 0 -5px 15px rgba(0,0,0,0.3);
            box-sizing: border-box;
        }
        #status { font-size: 14px; margin-bottom: 12px; color: #00ffcc; font-weight: bold; }
        .controls { display: flex; align-items: center; justify-content: center; gap: 15px; flex-wrap: wrap; }
        
        .btn-stop { background: #e74c3c; color: white; border: none; padding: 10px 25px; border-radius: 20px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-stop:hover { background: #c0392b; }
        
        input[type=range] { width: 150px; accent-color: #e74c3c; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <h1>📻 RADIO BRUNO PERÚ</h1>
    <p>Las mejores emisoras en vivo con el mejor sonido</p>
</div>

<div class="radio-grid">
    <div class="radio-card" onclick="play('https://18493.live.streamtheworld.com/RADIO_NUEVA_Q_SC', 'Nueva Q')">
        <img src="https://scr.crp.pe/as/images/logos/logo_nuevaq.png" alt="Nueva Q">
        <div class="radio-name">Nueva Q</div>
    </div>
    <div class="radio-card" onclick="play('https://strm112.1vps.es/8124/stream', 'Exitosa')">
        <img src="https://exitosanoticias.pe/images/logonew.png" alt="Exitosa" style="background:#e74c3c; padding:5px; border-radius:5px;">
        <div class="radio-name">Exitosa</div>
    </div>
    <div class="radio-card" onclick="play('https://17503.live.streamtheworld.com/RADIO_RPP_SC', 'RPP Noticias')">
        <img src="https://rpp.pe/img/logo-rpp.png" alt="RPP" style="background:#1a1a1a; padding:5px; border-radius:5px;">
        <div class="radio-name">RPP Noticias</div>
    </div>
    <div class="radio-card" onclick="play('https://19313.live.streamtheworld.com/PANAMERICANA_SC', 'Radio Panamericana')">
        <img src="https://scr.crp.pe/as/images/logos/logo_panamericana.png" alt="Panamericana">
        <div class="radio-name">Panamericana</div>
    </div>
    <div class="radio-card" onclick="play('https://17513.live.streamtheworld.com/RADIO_OXIGENO_SC', 'Radio Oxígeno')">
        <img src="https://cdn.oxigeno.com.pe/oxigeno/images/logo-oxigeno.png" alt="Oxígeno" style="background:#333; padding:5px; border-radius:5px;">
        <div class="radio-name">Oxígeno</div>
    </div>
    <div class="radio-card" onclick="play('https://18313.live.streamtheworld.com/RADIO_STUDIO92_SC', 'Studio 92')">
        <img src="https://cdn.studio92.com/studio92/images/logo-s92.png" alt="Studio 92" style="background:#1a1a1a; padding:5px; border-radius:5px;">
        <div class="radio-name">Studio 92</div>
    </div>
    <div class="radio-card" onclick="play('https://19253.live.streamtheworld.com/RADIO_INOLVIDABLE_SC', 'La Inolvidable')">
        <img src="https://scr.crp.pe/as/images/logos/logo_lainolvidable.png" alt="La Inolvidable">
        <div class="radio-name">La Inolvidable</div>
    </div>
    <div class="radio-card" onclick="play('https://18323.live.streamtheworld.com/RADIO_FELICIDAD_SC', 'Felicidad')">
        <img src="https://scr.crp.pe/as/images/logos/logo_felicidad.png" alt="Felicidad">
        <div class="radio-name">Felicidad</div>
    </div>
    <div class="radio-card" onclick="play('https://19223.live.streamtheworld.com/RADIO_MAGICA_SC', 'Radio Mágica')">
        <img src="https://scr.crp.pe/as/images/logos/logo_magica.png" alt="Mágica">
        <div class="radio-name">Mágica</div>
    </div>
    <div class="radio-card" onclick="play('https://stream-54.zeno.fm/5f0m7w6m768uv', 'A1 Cañete')">
        <img src="https://radioa1.pe/wp-content/uploads/2021/02/LOGO-A1-PNG-1.png" alt="A1">
        <div class="radio-name">A1 Cañete</div>
    </div>
</div>

<div class="player-bar">
    <div id="status">HAZ CLIC EN UN LOGO PARA ESCUCHAR</div>
    <div class="controls">
        <span>🔈</span>
        <input type="range" min="0" max="1" step="0.1" value="0.8" oninput="setV(this.value)">
        <span>🔊</span>
        <button class="btn-stop" onclick="stop()">DETENER RADIO</button>
    </div>
</div>

<script>
    var audio = new Audio();
    var s = document.getElementById('status');

    function play(url, name) {
        s.innerText = "CONECTANDO A " + name.toUpperCase() + "...";
        audio.pause();
        audio.src = url;
        audio.play().then(() => {
            s.innerText = "REPRODUCIENDO: " + name.toUpperCase() + " 🔴";
        }).catch(e => { s.innerText = "ERROR: CLICK DE NUEVO"; });
    }

    function stop() {
        audio.pause();
        audio.src = "";
        s.innerText = "TRANSMISIÓN DETENIDA";
    }

    function setV(v) { audio.volume = v; }
</script>

</body>
</html>

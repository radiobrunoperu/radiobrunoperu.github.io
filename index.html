<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Bruno Perú</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f0f0; text-align: center; padding: 20px; }
        .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; max-width: 1000px; margin: 0 auto; }
        .card { background: white; border: 2px solid #ccc; border-radius: 10px; width: 160px; padding: 15px; cursor: pointer; }
        .card:hover { border-color: red; background-color: #fff0f0; }
        .card img { width: 100px; height: 100px; display: block; margin: 0 auto 10px; }
        .card b { font-size: 14px; color: #333; }
        .player { position: fixed; bottom: 0; left: 0; width: 100%; background: #222; color: white; padding: 20px; }
        #estado { color: yellow; font-weight: bold; margin-bottom: 10px; }
        button { background: red; color: white; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>📻 RADIO BRUNO PERÚ</h1>
    <p>Haz clic en el cuadro para escuchar</p>

    <div class="grid">
        <div class="card" onclick="tocar('https://strm112.1vps.es/8124/stream', 'EXITOSA')">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/1a/Logo_de_Radio_Exitosa.png/250px-Logo_de_Radio_Exitosa.png">
            <b>RADIO EXITOSA</b>
        </div>

        <div class="card" onclick="tocar('https://18493.live.streamtheworld.com/RADIO_NUEVA_Q_SC', 'NUEVA Q')">
            <img src="https://cdn-icons-png.flaticon.com/512/727/727245.png">
            <b>RADIO NUEVA Q</b>
        </div>

        <div class="card" onclick="tocar('https://17503.live.streamtheworld.com/RADIO_RPP_SC', 'RPP')">
            <img src="https://rpp.pe/img/logo-rpp.png">
            <b>RPP NOTICIAS</b>
        </div>

        <div class="card" onclick="tocar('https://19313.live.streamtheworld.com/PANAMERICANA_SC', 'PANAMERICANA')">
            <img src="https://cdn-icons-png.flaticon.com/512/3616/3616654.png">
            <b>PANAMERICANA</b>
        </div>

        <div class="card" onclick="tocar('https://17513.live.streamtheworld.com/RADIO_OXIGENO_SC', 'OXIGENO')">
            <img src="https://cdn-icons-png.flaticon.com/512/1162/1162456.png">
            <b>RADIO OXÍGENO</b>
        </div>

        <div class="card" onclick="tocar('https://18313.live.streamtheworld.com/RADIO_STUDIO92_SC', 'STUDIO 92')">
            <img src="https://cdn-icons-png.flaticon.com/512/1162/1162474.png">
            <b>STUDIO 92</b>
        </div>
    </div>

    <div class="player">
        <div id="estado">SELECCIONA UNA RADIO</div>
        <input type="range" min="0" max="1" step="0.1" value="0.8" oninput="vol(this.value)">
        <button onclick="parar()">DETENER TODO</button>
    </div>

<script>
    var radio = new Audio();
    var e = document.getElementById('estado');

    function tocar(url, nombre) {
        e.innerText = "CARGANDO " + nombre + "...";
        radio.src = url;
        radio.play();
        radio.onloadstart = function() { e.innerText = "SINTONIZANDO..."; };
        radio.onplaying = function() { e.innerText = "ESCUCHANDO: " + nombre + " 🔴"; };
        radio.onerror = function() { e.innerText = "ERROR AL CONECTAR"; };
    }

    function parar() {
        radio.pause();
        radio.src = "";
        e.innerText = "DETENIDO";
    }

    function vol(v) { radio.volume = v; }
</script>

</body>
</html>

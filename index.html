<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Bruno Perú</title>
    <style>
        :root { --bg: #f0f2f5; --card: #ffffff; --accent: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; padding-bottom: 160px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; max-width: 900px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 15px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer; transition: 0.3s; border: 1px solid #ddd; }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .card img { width: 100%; height: 80px; object-fit: contain; margin-bottom: 10px; }
        .card div { font-weight: bold; font-size: 14px; color: #333; }
        .player { position: fixed; bottom: 0; left: 0; width: 100%; background: #1a1a1a; color: white; padding: 25px; box-sizing: border-box; }
        #status { font-size: 14px; margin-bottom: 10px; color: #2ecc71; font-weight: bold; }
        .btn-stop { background: var(--accent); color: white; border: none; padding: 10px 30px; border-radius: 20px; cursor: pointer; font-weight: bold; margin-left: 15px; }
    </style>
</head>
<body>

    <h1>📻 RADIO BRUNO PERÚ</h1>
    <p>Escucha tus radios favoritas en vivo</p>

    <div class="grid">
        <div class="card" onclick="play('https://strm112.1vps.es/8124/stream', 'Exitosa')">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSfI3-rA6i9p2y9vH6f4P4vE6R7v8O9Y0A1B2C3D" alt="Exitosa">
            <div>Radio Exitosa</div>
        </div>
        <div class="card" onclick="play('https://18493.live.streamtheworld.com/RADIO_NUEVA_Q_SC', 'Nueva Q')">
            <img src="https://scr.crp.pe/as/images/logos/logo_nuevaq.png" alt="Nueva Q">
            <div>Nueva Q</div>
        </div>
        <div class="card" onclick="play('https://17503.live.streamtheworld.com/RADIO_RPP_SC', 'RPP')">
            <img src="https://grupocpp.pe/img/logos/radio-rpp.png" alt="RPP">
            <div>RPP Noticias</div>
        </div>
        <div class="card" onclick="play('https://19313.live.streamtheworld.com/PANAMERICANA_SC', 'Panamericana')">
            <img src="https://scr.crp.pe/as/images/logos/logo_panamericana.png" alt="Panamericana">
            <div>Panamericana</div>
        </div>
        <div class="card" onclick="play('https://17513.live.streamtheworld.com/RADIO_OXIGENO_SC', 'Oxigeno')">
            <img src="https://grupocpp.pe/img/logos/radio-oxigeno.png" alt="Oxigeno">
            <div>Oxígeno</div>
        </div>
        <div class="card" onclick="play('https://18313.live.streamtheworld.com/RADIO_STUDIO92_SC', 'Studio 92')">
            <img src="https://grupocpp.pe/img/logos/radio-studio92.png" alt="Studio 92">
            <div>Studio 92</div>
        </div>
    </div>

    <div class="player">
        <div id="status">LISTO PARA REPRODUCIR</div>
        <input type="range" min="0" max="1" step="0.1" value="0.8" oninput="setV(this.value)">
        <button class="btn-stop" onclick="stop()">DETENER</button>
    </div>

<script>
    var audio = new Audio();
    var s = document.getElementById('status');

    function play(url, name) {
        s.innerText = "SINTONIZANDO " + name + "...";
        audio.pause();
        audio.src = url;
        audio.load(); // Fuerza la carga de la nueva fuente
        audio.play().then(() => {
            s.innerText = "EN VIVO: " + name + " 🔴";
        }).catch(e => {
            s.innerText = "ERROR AL CONECTAR. INTENTA OTRA VEZ.";
        });
    }

    function stop() {
        audio.pause();
        audio.src = "";
        s.innerText = "RADIO DETENIDA";
    }

    function setV(v) { audio.volume = v; }
</script>

</body>
</html>
